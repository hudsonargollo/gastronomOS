<!DOCTYPE html>
<html>
<head>
    <title>Test GastronomOS API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #5568d3;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 5px;
            white-space: pre-wrap;
            font-family: monospace;
        }
        .success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
        }
        .error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>
    <h1>🧪 Test GastronomOS API</h1>
    
    <h2>Step 1: Test API Health</h2>
    <button onclick="testHealth()">Test Health Endpoint</button>
    <div id="health-result"></div>
    
    <h2>Step 2: Create Demo Account</h2>
    <button onclick="createDemo()">Create Demo Account</button>
    <div id="create-result"></div>
    
    <h2>Step 3: Test Demo Login</h2>
    <button onclick="testLogin()">Test Demo Login</button>
    <div id="login-result"></div>

    <script>
        const API_BASE = 'https://api.gastronomos.clubemkt.digital';
        
        async function testHealth() {
            const result = document.getElementById('health-result');
            result.innerHTML = '<div class="result">Testing...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                result.innerHTML = `<div class="result success">✅ API is healthy!\n${JSON.stringify(data, null, 2)}</div>`;
            } catch (error) {
                result.innerHTML = `<div class="result error">❌ Error: ${error.message}</div>`;
            }
        }
        
        async function createDemo() {
            const result = document.getElementById('create-result');
            result.innerHTML = '<div class="result">Creating demo account...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/v1/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'demo@gastronomos.com',
                        password: 'demo123',
                        tenantName: 'Demo Restaurant',
                        tenantSlug: 'demo-restaurant'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `<div class="result success">✅ Demo account created!\n${JSON.stringify(data, null, 2)}</div>`;
                } else if (response.status === 409) {
                    result.innerHTML = `<div class="result success">✅ Demo account already exists!\nTry Step 3 to test login.</div>`;
                } else {
                    result.innerHTML = `<div class="result error">❌ Error: ${data.message || data.error}\nStatus: ${response.status}</div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="result error">❌ Error: ${error.message}</div>`;
            }
        }
        
        async function testLogin() {
            const result = document.getElementById('login-result');
            result.innerHTML = '<div class="result">Testing login...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/api/v1/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: 'demo@gastronomos.com',
                        password: 'demo123'
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    result.innerHTML = `<div class="result success">✅ Login successful!\nUser: ${data.user.email}\nRole: ${data.user.role}\nToken: ${data.token.substring(0, 30)}...</div>`;
                } else {
                    result.innerHTML = `<div class="result error">❌ Login failed: ${data.message || data.error}\nStatus: ${response.status}</div>`;
                }
            } catch (error) {
                result.innerHTML = `<div class="result error">❌ Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
